name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Scan secrets
        run: ./scripts/scan-secrets.sh

  package:
    name: Package desktop ${{ matrix.artifact }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ArchIToken-VPN-Client-linux-x86_64
            binary: ArchIToken-VPN-Client
            output: ArchIToken-VPN-Client-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: ArchIToken-VPN-Client-linux-arm64
            binary: ArchIToken-VPN-Client
            output: ArchIToken-VPN-Client-linux-arm64
          - os: windows-latest
            artifact: ArchIToken-VPN-Client-windows-x86_64
            binary: ArchIToken-VPN-Client.exe
            output: ArchIToken-VPN-Client-windows-x86_64.exe
          - os: windows-11-arm
            artifact: ArchIToken-VPN-Client-windows-arm64
            binary: ArchIToken-VPN-Client.exe
            output: ArchIToken-VPN-Client-windows-arm64.exe
          - os: macos-15-intel
            artifact: ArchIToken-VPN-Client-macos-x86_64
            binary: ArchIToken-VPN-Client
            output: ArchIToken-VPN-Client-macos-x86_64
          - os: macos-14
            artifact: ArchIToken-VPN-Client-macos-arm64
            binary: ArchIToken-VPN-Client
            output: ArchIToken-VPN-Client-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build pyinstaller
      - name: Install package
        run: python -m pip install -e .
      - name: Build Python distributions
        run: python -m build
      - name: Build executable
        run: python -m PyInstaller --noconfirm --onefile --name ArchIToken-VPN-Client --collect-submodules tkinter packaging/pyinstaller_entry.py
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p release
          cp "dist/${{ matrix.binary }}" "release/${{ matrix.output }}"
          cp README.md LICENSE THIRD_PARTY_NOTICES.md release/
          if [ -d dist ] && ls dist/*.whl >/dev/null 2>&1; then cp dist/*.whl release/; fi
          if [ -d dist ] && ls dist/*.tar.gz >/dev/null 2>&1; then cp dist/*.tar.gz release/; fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: release/

  android:
    name: Package Android
    needs: test
    runs-on: ubuntu-latest
    env:
      ANDROID_RUNTIME_ZIP_BASE64: ${{ secrets.ANDROID_RUNTIME_ZIP_BASE64 }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Install private Android runtime
        shell: bash
        run: |
          if [ -z "$ANDROID_RUNTIME_ZIP_BASE64" ]; then
            echo "No private Android runtime supplied; building shell APK."
            exit 0
          fi
          mkdir -p android/src/main/assets/architoken-mobile
          echo "$ANDROID_RUNTIME_ZIP_BASE64" | base64 --decode > /tmp/architoken-android-runtime.zip
          unzip -o /tmp/architoken-android-runtime.zip -d android/src/main/assets/architoken-mobile
      - name: Configure Android release signing
        shell: bash
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No Android keystore supplied; release APK/AAB will remain unsigned."
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/android-signing"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-signing/architoken-release.jks"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/android-signing/architoken-release.jks" >> "$GITHUB_ENV"
      - name: Build Android packages
        run: gradle :android:assembleDebug :android:assembleRelease :android:bundleRelease --no-daemon
      - name: Prepare Android artifact
        run: |
          mkdir -p release
          cp android/build/outputs/apk/debug/android-debug.apk release/ArchIToken-VPN-Client-android-universal-debug.apk
          if [ -n "${ANDROID_KEYSTORE_FILE:-}" ] && [ -f android/build/outputs/apk/release/android-release.apk ]; then
            cp android/build/outputs/apk/release/android-release.apk release/ArchIToken-VPN-Client-android-universal-release-signed.apk
            cp android/build/outputs/bundle/release/android-release.aab release/ArchIToken-VPN-Client-android-universal-release-signed.aab
          else
            cp android/build/outputs/apk/release/android-release-unsigned.apk release/ArchIToken-VPN-Client-android-universal-release-unsigned.apk
            cp android/build/outputs/bundle/release/android-release.aab release/ArchIToken-VPN-Client-android-universal-release-unsigned.aab
          fi
          cp README.md LICENSE THIRD_PARTY_NOTICES.md release/
      - uses: actions/upload-artifact@v7
        with:
          name: ArchIToken-VPN-Client-android
          path: release/

  ios:
    name: Package iOS simulator
    needs: test
    runs-on: macos-14
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      IOS_APP_BUNDLE_ID: ${{ secrets.IOS_APP_BUNDLE_ID }}
      IOS_TUNNEL_BUNDLE_ID: ${{ secrets.IOS_TUNNEL_BUNDLE_ID }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      APPLE_TUNNEL_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_TUNNEL_PROVISIONING_PROFILE_BASE64 }}
      IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
      ARCHITOKEN_PACKET_CORE_ZIP_BASE64: ${{ secrets.ARCHITOKEN_PACKET_CORE_ZIP_BASE64 }}
    steps:
      - uses: actions/checkout@v6
      - name: Install private iOS PacketCore
        run: |
          if [ -z "$ARCHITOKEN_PACKET_CORE_ZIP_BASE64" ]; then
            echo "No private PacketCore supplied; building public simulator source."
            exit 0
          fi
          mkdir -p ios/PrivateFrameworks
          echo "$ARCHITOKEN_PACKET_CORE_ZIP_BASE64" | base64 --decode > /tmp/architoken-packet-core.zip
          unzip -o /tmp/architoken-packet-core.zip -d ios/PrivateFrameworks
          unzip -o /tmp/architoken-packet-core.zip -d .
      - name: Build iOS simulator app
        run: |
          xcodebuild \
            -project ios/ArchITokenVPNClient.xcodeproj \
            -scheme ArchITokenVPNClient \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/ios-derived \
            CODE_SIGNING_ALLOWED=NO \
            clean build
      - name: Prepare iOS simulator artifact
        run: |
          mkdir -p release
          APP="build/ios-derived/Build/Products/Debug-iphonesimulator/ArchITokenVPNClient.app"
          test -d "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" release/ArchIToken-VPN-Client-ios-simulator.zip
          ditto -c -k ios release/ArchIToken-VPN-Client-ios-source.zip
          cp README.md LICENSE THIRD_PARTY_NOTICES.md release/
      - name: Build signed iOS archive
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ] || [ -z "$APPLE_PROVISIONING_PROFILE_BASE64" ] || [ -z "$APPLE_TUNNEL_PROVISIONING_PROFILE_BASE64" ]; then
            echo "No complete Apple signing material supplied; skipping signed IPA."
            exit 0
          fi
          ./scripts/build-ios-signed.sh
          if [ -f build/ios-signed/ArchIToken-VPN-Client.ipa ]; then
            cp build/ios-signed/ArchIToken-VPN-Client.ipa release/
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ArchIToken-VPN-Client-ios
          path: release/

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package, android, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir release
          find artifacts -maxdepth 3 -type f -print -exec cp {} release/ \;
      - uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true
